apiVersion: batch/v1
kind: Job
metadata:
  name: k6
  labels:
    app.kubernetes.io/job: k6
spec:
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        app.kubernetes.io/job: k6
    spec:
      containers:
        - name: k6
          image: grafana/k6
          command:
            - |
              k6 run /scripts/load-script.js
          volumeMounts:
            - mountPath: /scripts
              name: scripts
      volumes:
        - name: scripts
          configMap:
            name: k6-load-scripts
      restartPolicy: Never
  backoffLimit: 4